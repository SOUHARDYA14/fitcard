<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitCard — Verify code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--text); min-height:100vh; line-height:1.5;
    display:flex; align-items:center; justify-content:center; padding:40px 20px;
  }

  .card{position:relative; z-index:1; width:100%; max-width:400px;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
    padding:38px 34px; box-shadow:0 30px 70px rgba(0,0,0,.4);
    animation:fadeUp .5s ease forwards;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}

  .brand{font-family:var(--serif); font-style:italic; font-weight:600; font-size:20px;
    display:flex; align-items:center; gap:8px; color:var(--text); text-decoration:none; margin-bottom:26px}
  .brand .chip{width:20px;height:15px;border-radius:4px;
    background:linear-gradient(135deg,#f6e2a8,#c9a24a); display:inline-block}

  h1{font-family:var(--serif); font-weight:500; font-style:italic; font-size:28px; margin-bottom:6px}
  .sub{color:var(--muted); font-size:14px; margin-bottom:26px}
  .sub strong{color:var(--text); font-weight:600}

  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:18px}
  label{font-size:12px; color:var(--muted); font-weight:500; letter-spacing:.04em; text-transform:uppercase}
  input{
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:11px 12px; font-size:22px; letter-spacing:.3em; text-align:center;
    font-family:'Space Grotesk',sans-serif; width:100%;
    transition:border-color .2s;
  }
  input:focus{outline:none; border-color:var(--gold)}

  button{
    width:100%; background:linear-gradient(180deg,#f0d090,#d8ab55);
    color:#211a09; font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:15px; border:none; border-radius:10px; padding:13px 20px;
    cursor:pointer; margin-top:6px; transition:filter .15s;
  }
  button:hover{filter:brightness(1.06)}

  .error{background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.4); color:var(--rose);
    font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:18px}

  .dev-otp{background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.4); color:var(--mint);
    font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:18px}
  .dev-otp strong{font-family:'Space Grotesk',sans-serif; letter-spacing:.15em}

  .foot{margin-top:24px; text-align:center; font-size:13px; color:var(--muted)}
  .foot form{display:inline}
  .foot button.link{
    all:unset; cursor:pointer; color:var(--gold); font-size:13px; font-weight:500;
  }
  .foot button.link:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="dawn-wash"></div>
<div class="grain"></div>

<div class="card">
  <a href="/" class="brand"><span class="chip"></span>FitCard</a>
  <h1>Enter your code</h1>
  <p class="sub">We sent a 6-digit code to <strong>{{ contact }}</strong>.</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if dev_otp %}
  <div class="dev-otp">Dev mode — MSG91 isn't configured, so no message was sent. Your code is <strong>{{ dev_otp }}</strong>.</div>
  {% endif %}

  <form method="POST" action="/login/verify">
    <div class="field">
      <label for="otp">Code</label>
      <input type="text" id="otp" name="otp" inputmode="numeric" pattern="\d{6}" maxlength="6" required autofocus>
    </div>
    <button type="submit">Verify &amp; sign in</button>
  </form>

  <div class="foot">
    Didn't get it?
    <form method="POST" action="/login/resend"><button type="submit" class="link">Resend code</button></form>
  </div>
</div>

</body>
</html>
