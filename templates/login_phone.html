<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitCard — Sign in with phone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/theme.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--font);
    color:var(--text); min-height:100vh; line-height:1.5;
    display:flex; align-items:center; justify-content:center; padding:40px 20px;
  }

  .card{position:relative; z-index:1; width:100%; max-width:400px;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
    padding:38px 34px; box-shadow:0 30px 70px rgba(0,0,0,.4);
    animation:fadeUp .5s ease forwards;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}

  .brand{font-family:var(--serif); font-weight:600; font-size:20px; letter-spacing:-.02em;
    display:flex; align-items:center; gap:8px; color:var(--text); text-decoration:none; margin-bottom:26px}
  .brand .chip{width:20px;height:15px;border-radius:4px;
    background:linear-gradient(135deg,var(--gold-soft),var(--gold-strong)); display:inline-block}

  h1{font-family:var(--serif); font-weight:var(--weight-display); font-size:28px; margin-bottom:6px; letter-spacing:-.018em}
  .sub{color:var(--muted); font-size:14px; margin-bottom:26px}

  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:18px}
  label{font-size:12px; color:var(--muted); font-weight:500; font-family:var(--mono); letter-spacing:.09em; text-transform:uppercase}
  input{
    background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:11px 12px; font-size:15px; font-family:var(--font); width:100%;
    transition:border-color .2s;
  }
  input:focus{outline:none; border-color:var(--gold)}
  .hint{font-size:12px; color:var(--muted); margin-top:-10px; margin-bottom:18px}

  button{
    width:100%; background:linear-gradient(180deg,var(--gold-soft),var(--gold-strong));
    color:var(--on-gold); font-family:var(--mono); font-weight:600; text-transform:uppercase; letter-spacing:.09em;
    font-size:15px; border:none; border-radius:10px; padding:13px 20px;
    cursor:pointer; margin-top:6px; transition:filter .15s;
  }
  button:hover{filter:brightness(1.06)}

  .error{background:rgba(185,28,28,.08); border:1px solid rgba(185,28,28,.35); color:var(--rose);
    font-size:13px; padding:10px 12px; border-radius:8px; margin-bottom:18px}

  .foot{margin-top:24px; text-align:center; font-size:13px; color:var(--muted)}
  .foot a{color:var(--gold); text-decoration:none; font-weight:500}
  .foot a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="dawn-wash"></div>
<div class="grain"></div>

<div class="card">
  <a href="/" class="brand"><span class="chip"></span>FitCard</a>
  <h1>Sign in with phone</h1>
  <p class="sub">We'll text you a one-time code.</p>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="POST" action="/login/phone">
    <div class="field">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="919876543210" pattern="\d{10,15}" required autofocus>
    </div>
    <p class="hint">With country code, digits only.</p>
    <button type="submit">Send code</button>
  </form>

  <div class="foot"><a href="/login">Sign in with email and password instead</a></div>
</div>

</body>
</html>
