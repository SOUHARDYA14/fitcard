<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitCard — All cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
<style>
  :root{
    --ink:#0E1116; --surface:#171B22; --surface-2:#1F2530;
    --line:#2A313D; --text:#F2F4F8; --muted:#9AA4B2;
    --gold:#E5C07B; --mint:#34D399;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',system-ui,sans-serif; cursor:none;
    background:
      radial-gradient(900px 500px at 15% -10%, #1a2130 0%, transparent 60%),
      radial-gradient(700px 500px at 110% 10%, #201a2b 0%, transparent 55%),
      var(--ink);
    color:var(--text); min-height:100vh; line-height:1.5;
    padding:48px 20px 80px;
  }
  @media (pointer:coarse), (hover:none){ body{cursor:auto} }
  .wrap{max-width:960px;margin:0 auto}

  .hero-row{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    padding-bottom:18px;
    opacity:0; animation:fadeUp .5s ease forwards;}
  .brand{font-family:var(--serif); font-style:italic; font-weight:600; font-size:19px; letter-spacing:-.01em;
    display:flex; align-items:center; gap:8px; color:var(--text); text-decoration:none}
  .brand .chip{width:20px;height:15px;border-radius:4px;
    background:linear-gradient(135deg,#f6e2a8,#c9a24a); display:inline-block}
  .back-link{font-size:13px; color:var(--mint); text-decoration:none; font-weight:500; transition:opacity .15s}
  .back-link:hover{opacity:.75}
  .masthead-rule{height:1px; background:linear-gradient(90deg,var(--line),transparent)}

  .intro{display:grid; grid-template-columns:30px 1fr; gap:24px; margin-top:30px}
  .spine{display:flex; flex-direction:column; align-items:center; gap:14px}
  .spine .hairline{width:1px; flex:1; background:linear-gradient(180deg,var(--gold),transparent); min-height:40px}

  h1{
    font-family:var(--serif); font-weight:500; font-style:italic;
    font-size:clamp(28px,5vw,42px); line-height:1.06; margin:0 0 8px;
    letter-spacing:-.01em;
    opacity:0; animation:fadeUp .5s .08s ease forwards;
  }
  .sub{color:var(--muted); font-size:15px;
    opacity:0; animation:fadeUp .5s .14s ease forwards;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}

  .controls{
    margin-top:32px; margin-left:54px; display:flex; gap:24px; flex-wrap:wrap; align-items:end;
    padding-bottom:16px; border-bottom:1px solid var(--line);
    opacity:0; animation:fadeUp .5s .2s ease forwards;
  }
  .controls .field{display:flex; flex-direction:column; gap:6px}
  .controls label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
  .controls input, .controls select{
    background:transparent; border:none; border-bottom:1px solid var(--line);
    color:var(--text); padding:6px 2px; border-radius:0;
    font-size:15px; font-family:'Space Grotesk',sans-serif;
    transition:border-color .2s;
  }
  .controls input{flex:1; min-width:220px}
  .controls input:focus, .controls select:focus{
    outline:none; border-bottom-color:var(--gold);
  }
  .count{color:var(--muted); font-size:13px; margin-top:14px; margin-left:54px}

  .list{margin-top:6px; margin-left:54px; display:flex; flex-direction:column}
  .row{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    border-bottom:1px solid var(--line); padding:18px 4px;
    flex-wrap:wrap;
    opacity:0; animation:rowIn .4s ease forwards;
    transition:padding-left .2s ease, border-color .2s ease;
  }
  .row:hover{padding-left:12px; border-color:rgba(229,192,123,.4)}
  .row:nth-child(-n+10){animation-delay:calc(.03s * var(--i, 0))}
  @keyframes rowIn{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:translateY(0)}}
  .row-main{display:flex; align-items:baseline; gap:14px; min-width:220px}
  .row-index{font-family:var(--serif); font-style:italic; color:var(--gold); font-size:15px; min-width:26px}
  .row-text{display:flex; flex-direction:column; gap:3px}
  .row-name{font-family:var(--serif); font-style:italic; font-weight:600; font-size:17px}
  .row-bank{color:var(--muted); font-size:13px}
  .row-suited{color:#6B7383; font-size:12px; max-width:280px}

  .row-stats{display:flex; gap:22px; align-items:center; flex-wrap:wrap}
  .stat{display:flex; flex-direction:column; gap:2px; min-width:70px}
  .stat-label{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted)}
  .stat-val{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px}

  .tier-dot{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:500}
  .tier-dot::before{content:""; width:8px; height:8px; border-radius:50%}
  .tier-dot.free::before, .tier-dot.free{color:#34D399}    .tier-dot.free::before{background:#34D399}
  .tier-dot.entry::before, .tier-dot.entry{color:#2dd4bf}  .tier-dot.entry::before{background:#2dd4bf}
  .tier-dot.mid::before, .tier-dot.mid{color:#818cf8}      .tier-dot.mid::before{background:#818cf8}
  .tier-dot.super::before, .tier-dot.super{color:#c084fc}  .tier-dot.super::before{background:#c084fc}
  .tier-dot.luxury::before, .tier-dot.luxury{color:var(--gold)} .tier-dot.luxury::before{background:var(--gold)}
  .tier-dot.na::before, .tier-dot.na{color:#94a3b8}        .tier-dot.na::before{background:#94a3b8}

  .empty{color:var(--muted); text-align:center; padding:40px 0; font-size:14px}

  @media (max-width:560px){
    .intro{grid-template-columns:1fr}
    .spine{display:none}
    .controls, .count, .list{margin-left:0}
    .row{flex-direction:column; align-items:flex-start}
    .row-stats{width:100%; justify-content:space-between}
  }
</style>
</head>
<body>

<div class="grain"></div>

<div class="wrap">
  <div class="hero-row">
    <a href="/" class="brand"><span class="chip"></span>FitCard</a>
    <a href="/match" class="back-link">← Back to matcher</a>
    <a href="/insurance" class="back-link">Insurance</a>
  </div>
  <div class="masthead-rule"></div>

  <div class="intro">
    <div class="spine"><div class="hairline"></div></div>
    <div>
      <h1>All cards in the database.</h1>
      <p class="sub">{{ cards|length }} cards total. Search or sort to browse everything — not just your top 5 matches.</p>
    </div>
  </div>

  <div class="controls">
    <div class="field" style="flex:1">
      <label for="search">Search</label>
      <input type="text" id="search" placeholder="Card name or bank…">
    </div>
    <div class="field">
      <label for="sort">Sort by</label>
      <select id="sort">
        <option value="fee-asc">Fee: low to high</option>
        <option value="fee-desc">Fee: high to low</option>
        <option value="name-asc">Name: A to Z</option>
        <option value="bank-asc">Bank: A to Z</option>
      </select>
    </div>
  </div>
  <div class="count" id="count"></div>

  <div class="list" id="list"></div>
</div>

<script>
  const CARDS = {{ cards|tojson }};

  const TIER_CLASS = {
    "Lifetime Free": "free",
    "Entry": "entry",
    "Mid-range": "mid",
    "Super Premium": "super",
    "Luxury": "luxury",
  };

  const searchEl = document.getElementById("search");
  const sortEl = document.getElementById("sort");
  const listEl = document.getElementById("list");
  const countEl = document.getElementById("count");

  function money(n){ return n == null ? "—" : "₹" + Number(n).toLocaleString("en-IN"); }

  function render(){
    const q = searchEl.value.trim().toLowerCase();
    let items = CARDS.filter(c =>
      !q || c.card_name.toLowerCase().includes(q) || c.bank_name.toLowerCase().includes(q)
    );

    const sort = sortEl.value;
    items = items.slice().sort((a, b) => {
      // Cards with no listed fee always sort last, regardless of direction.
      if (sort === "fee-asc")  return (a.joining_fee ?? Infinity) - (b.joining_fee ?? Infinity);
      if (sort === "fee-desc") return (b.joining_fee ?? -Infinity) - (a.joining_fee ?? -Infinity);
      if (sort === "name-asc") return a.card_name.localeCompare(b.card_name);
      if (sort === "bank-asc") return a.bank_name.localeCompare(b.bank_name);
      return 0;
    });

    countEl.textContent = items.length + " card" + (items.length === 1 ? "" : "s") + " shown";

    if (!items.length) {
      listEl.innerHTML = `<div class="empty">No cards match "${q}".</div>`;
      return;
    }

    listEl.innerHTML = items.map((c, idx) => {
      const tc = TIER_CLASS[c.tier] || "na";
      return `
        <div class="row" style="--i:${idx}">
          <div class="row-main">
            <span class="row-index">${String(idx + 1).padStart(2, "0")}</span>
            <div class="row-text">
              <span class="row-name">${c.card_name}</span>
              <span class="row-bank">${c.bank_name}</span>
              ${c.best_suited_for ? `<span class="row-suited">${c.best_suited_for}</span>` : ""}
            </div>
          </div>
          <div class="row-stats">
            <div class="stat"><span class="stat-label">Fee</span><span class="stat-val">${money(c.joining_fee)}</span></div>
            <div class="stat"><span class="stat-label">Return</span><span class="stat-val">${c.return}</span></div>
            <span class="tier-dot ${tc}">${c.tier}</span>
          </div>
        </div>
      `;
    }).join("");
  }

  searchEl.addEventListener("input", render);
  sortEl.addEventListener("change", render);
  render();
</script>
<script src="/static/theme.js" defer></script>

</body>
</html>
